<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GEM JAR 수능 성적 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070d;
      --panel: rgba(15, 21, 35, 0.76);
      --panel-strong: rgba(22, 31, 51, 0.92);
      --line: rgba(177, 210, 255, 0.18);
      --text: #edf5ff;
      --muted: #9ba9bd;
      --accent: #7fd6ff;
      --gold: #ffd166;
      --danger: #ff6b8a;
      --korean: #ff8c42;
      --math: #4a90d9;
      --english: #5dbb63;
      --bioethics: #9b59b6;
      --sociology: #e91e8c;
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(70, 146, 217, 0.24), transparent 34rem),
        linear-gradient(180deg, #070914 0%, #04060b 58%, #020308 100%);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 54px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 3.7rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
      gap: 22px;
      align-items: stretch;
    }

    .jar-stage {
      min-height: 650px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(17, 26, 44, 0.86), rgba(4, 7, 14, 0.96));
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.36);
    }

    .jar-stage::after {
      content: "";
      position: absolute;
      inset: 16% 22% 20%;
      z-index: 1;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.36), rgba(127, 214, 255, 0.2) 22%, transparent 62%);
      opacity: 0;
      transform: scale(0.35);
      pointer-events: none;
    }

    .jar-stage.energy-pulse::after {
      animation: energyPulse 620ms ease-out;
    }

    .jar-stage.energy-pulse .glass-body {
      animation: glassShake 520ms cubic-bezier(.2,.9,.24,1);
    }

    @keyframes energyPulse {
      0% {
        opacity: 0.95;
        transform: scale(0.25);
      }
      100% {
        opacity: 0;
        transform: scale(1.28);
      }
    }

    @keyframes glassShake {
      0%, 100% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-3px) rotate(-0.25deg);
      }
      42% {
        transform: translateX(4px) rotate(0.32deg);
      }
      64% {
        transform: translateX(-2px) rotate(-0.18deg);
      }
      82% {
        transform: translateX(1px);
      }
    }

    .stars {
      position: absolute;
      inset: 0;
      opacity: 0.5;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.62) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(127,214,255,0.56) 0 1px, transparent 1.7px);
      background-position: 22px 36px, 104px 148px;
      background-size: 120px 130px, 180px 170px;
      pointer-events: none;
    }

    .jar-wrap {
      position: absolute;
      inset: 38px 26px 88px;
      display: grid;
      place-items: center;
    }

    #jar-canvas {
      position: absolute;
      width: min(430px, 88vw);
      height: min(550px, 70vh);
      max-height: 550px;
      z-index: 2;
      pointer-events: none;
    }

    .glass-jar {
      position: absolute;
      width: min(430px, 88vw);
      height: min(550px, 70vh);
      max-height: 550px;
      z-index: 3;
      pointer-events: none;
      filter:
        drop-shadow(0 18px 34px rgba(4, 12, 24, 0.58))
        drop-shadow(0 0 26px rgba(127, 214, 255, 0.14));
    }

    .glass-jar::before {
      content: "";
      position: absolute;
      left: 20%;
      right: 20%;
      top: 1.5%;
      height: 13%;
      border-radius: 8px 8px 16px 16px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.28), rgba(255,255,255,0.08) 18%, rgba(127,214,255,0.08) 52%, rgba(255,255,255,0.28)),
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(127,214,255,0.04));
      border: 2px solid transparent;
      background-clip: padding-box, border-box;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.22),
        inset 12px 0 18px rgba(255,255,255,0.1),
        inset -10px 0 16px rgba(127,214,255,0.08),
        0 4px 12px rgba(127,214,255,0.12);
    }

    .glass-body {
      position: absolute;
      left: 5.8%;
      right: 5.8%;
      top: 11.5%;
      bottom: 4.5%;
      border: 3px solid transparent;
      border-radius: 29% 29% 24% 24% / 11% 11% 15% 15%;
      background:
        radial-gradient(ellipse at 23% 13%, rgba(255,255,255,0.46), rgba(255,255,255,0.16) 12%, rgba(255,255,255,0.035) 31%, transparent 48%),
        linear-gradient(104deg, rgba(255,255,255,0.19), transparent 20% 72%, rgba(127,214,255,0.13)),
        linear-gradient(90deg, rgba(255,255,255,0.1), rgba(127,214,255,0.045) 18%, rgba(255,255,255,0.02) 48%, rgba(127,214,255,0.11) 78%, rgba(255,255,255,0.19)),
        linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.018) 58%, rgba(127,214,255,0.08));
      background-clip: padding-box;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.2),
        inset 10px 0 20px rgba(255,255,255,0.1),
        inset -12px 0 24px rgba(63,166,219,0.1),
        inset 0 -28px 38px rgba(207,245,255,0.12),
        0 0 0 1px rgba(127,214,255,0.2);
      overflow: hidden;
    }

    .glass-body::before {
      content: "";
      position: absolute;
      inset: -3px;
      border: 3px solid transparent;
      border-radius: inherit;
      background:
        linear-gradient(110deg, rgba(255,255,255,0.62), rgba(174,232,255,0.12) 24%, rgba(255,255,255,0.28) 48%, rgba(83,177,232,0.18) 68%, rgba(255,255,255,0.54)) border-box;
      -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0.9;
    }

    .glass-body::after {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      bottom: 2.2%;
      height: 10%;
      border-radius: 50% / 74%;
      background:
        radial-gradient(ellipse at 50% 74%, rgba(255,255,255,0.24), transparent 56%),
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(127,214,255,0.11) 48%, rgba(255,255,255,0.27));
      border: 2px solid rgba(222, 249, 255, 0.28);
      box-shadow:
        inset 0 16px 24px rgba(255,255,255,0.1),
        inset 0 -16px 22px rgba(210,247,255,0.16),
        0 -4px 22px rgba(127,214,255,0.12);
    }

    .glass-highlight {
      position: absolute;
      left: 21%;
      top: 16%;
      width: 22%;
      height: 45%;
      border-radius: 56% 34% 44% 48% / 36% 28% 70% 64%;
      background:
        radial-gradient(ellipse at 34% 8%, rgba(255,255,255,0.72), rgba(255,255,255,0.26) 28%, transparent 64%),
        linear-gradient(160deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04) 74%, transparent);
      filter: blur(0.3px);
      opacity: 0.82;
      transform: rotate(8deg);
    }

    .glass-rim {
      position: absolute;
      left: 19.2%;
      right: 19.2%;
      top: 1%;
      height: 4.8%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.5), rgba(127,214,255,0.15), rgba(255,255,255,0.56)),
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(127,214,255,0.08));
      border: 2px solid rgba(224, 249, 255, 0.45);
      box-shadow:
        inset 0 4px 5px rgba(255,255,255,0.18),
        inset 0 -5px 8px rgba(17,54,78,0.24),
        0 0 18px rgba(127,214,255,0.12);
    }

    .goal-line {
      position: absolute;
      left: 50%;
      top: 18%;
      width: min(320px, 66vw);
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 700;
      text-shadow: 0 0 18px rgba(255, 209, 102, 0.48);
      pointer-events: none;
    }

    .goal-line::before,
    .goal-line::after {
      content: "";
      height: 1px;
      flex: 1;
      border-top: 1px dashed rgba(255, 209, 102, 0.8);
    }

    .jar-readout {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .jar-actions {
      display: grid;
      gap: 9px;
    }

    .total-number {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.6rem);
      line-height: 0.94;
      font-weight: 800;
    }

    .total-number span {
      color: var(--accent);
    }

    .caption {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .primary-button,
    .ghost-button,
    .icon-button {
      border: 1px solid rgba(127, 214, 255, 0.34);
      color: var(--text);
      background: linear-gradient(180deg, rgba(26, 72, 103, 0.92), rgba(13, 34, 58, 0.92));
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      border-radius: 8px;
      min-height: 44px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .primary-button:hover,
    .ghost-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
      border-color: rgba(127, 214, 255, 0.76);
    }

    .ghost-button {
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .energy-button {
      border-color: rgba(255, 209, 102, 0.54);
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.34), transparent 28%),
        linear-gradient(180deg, rgba(109, 64, 190, 0.94), rgba(16, 73, 113, 0.92));
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.28),
        0 0 22px rgba(255, 209, 102, 0.14);
    }

    .side-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .metric-band,
    .subject-status,
    .chart-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(16px);
    }

    .metric-band {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .metric {
      min-height: 104px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.075);
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .metric .value {
      display: block;
      margin-top: 8px;
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1.08;
    }

    .subject-status {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      font-size: 1rem;
    }

    .section-title small {
      color: var(--muted);
      font-weight: 500;
    }

    .subject-row {
      display: grid;
      grid-template-columns: 48px 1fr 62px;
      gap: 10px;
      align-items: center;
      font-size: 0.9rem;
    }

    .bar {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--subject-color);
      box-shadow: 0 0 18px var(--subject-color);
      transition: width 500ms ease;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .chart-section {
      padding: 18px;
      min-height: 360px;
    }

    .chart-section.wide {
      grid-column: 1 / -1;
    }

    .chart-box {
      position: relative;
      height: 288px;
      margin-top: 12px;
    }

    .record-list {
      display: grid;
      gap: 9px;
      margin-top: 12px;
      max-height: 288px;
      overflow: auto;
      padding-right: 4px;
    }

    .record-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.045);
    }

    .record-item strong {
      display: block;
      font-size: 0.95rem;
    }

    .record-item small {
      color: var(--muted);
    }

    .delete-button {
      border: 0;
      color: #ff9db0;
      background: transparent;
      padding: 8px;
      border-radius: 8px;
    }

    .delete-button:hover {
      background: rgba(255, 107, 138, 0.14);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.64);
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(920px, 100%);
      max-height: min(860px, calc(100vh - 36px));
      overflow: auto;
      border: 1px solid rgba(177, 210, 255, 0.26);
      border-radius: 8px;
      background: #0b101c;
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.56);
    }

    .modal-header,
    .modal-footer {
      position: sticky;
      background: rgba(11, 16, 28, 0.96);
      backdrop-filter: blur(14px);
      z-index: 2;
    }

    .modal-header {
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .icon-button {
      width: 42px;
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      background: rgba(255,255,255,0.06);
    }

    .score-form {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field,
    .subject-card {
      display: grid;
      gap: 7px;
    }

    .field label,
    .subject-card legend {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(177, 210, 255, 0.22);
      border-radius: 8px;
      padding: 0 11px;
      background: rgba(255, 255, 255, 0.065);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(127, 214, 255, 0.8);
      box-shadow: 0 0 0 3px rgba(127, 214, 255, 0.13);
    }

    .subject-card {
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(177, 210, 255, 0.16);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
    }

    .subject-card legend {
      padding: 0 6px;
      color: var(--text);
    }

    .cutoff-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .modal-footer {
      bottom: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
    }

    .form-error {
      min-height: 1.2em;
      color: var(--danger);
      font-size: 0.88rem;
    }

    .empty {
      color: var(--muted);
      padding: 20px;
      border: 1px dashed rgba(177, 210, 255, 0.24);
      border-radius: 8px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .topbar,
      .hero,
      .dashboard {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: start;
      }

      .jar-stage {
        min-height: 590px;
      }

      .dashboard {
        display: grid;
      }
    }

    @media (max-width: 620px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .topbar,
      .jar-readout,
      .modal-footer {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-button {
        width: 100%;
        justify-content: center;
      }

      .metric-grid,
      .form-grid,
      .cutoff-grid {
        grid-template-columns: 1fr;
      }

      .chart-section {
        min-height: 330px;
      }
    }

    @media (max-width: 430px) {
      .app-shell {
        width: 100%;
        padding: 12px 10px 32px;
      }

      .topbar {
        gap: 12px;
        margin-bottom: 12px;
      }

      .brand h1 {
        font-size: 2.12rem;
      }

      .brand p {
        font-size: 0.82rem;
        line-height: 1.42;
      }

      .hero {
        gap: 12px;
      }

      .jar-stage {
        min-height: min(560px, calc(100svh - 218px));
        border-left: 0;
        border-right: 0;
      }

      .jar-wrap {
        inset: 8px 0 118px;
      }

      #jar-canvas,
      .glass-jar {
        width: min(360px, 94vw);
        height: min(472px, calc(100svh - 286px));
        min-height: 382px;
      }

      .goal-line {
        top: 14%;
        width: min(268px, 68vw);
        font-size: 0.76rem;
      }

      .jar-readout {
        left: 14px;
        right: 14px;
        bottom: 14px;
        gap: 10px;
      }

      .jar-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .jar-actions .ghost-button {
        min-height: 42px;
        padding: 0 10px;
        font-size: 0.86rem;
      }

      .total-number {
        font-size: 2.55rem;
      }

      .caption {
        font-size: 0.82rem;
        margin-top: 4px;
      }

      .side-panel {
        gap: 10px;
      }

      .metric-band,
      .subject-status,
      .chart-section {
        border-left: 0;
        border-right: 0;
      }

      .metric-band,
      .subject-status {
        padding: 14px;
      }

      .metric {
        min-height: 82px;
        padding: 12px;
      }

      .metric .value {
        font-size: 1.24rem;
      }

      .subject-row {
        grid-template-columns: 42px 1fr 56px;
        font-size: 0.84rem;
      }

      .dashboard {
        gap: 12px;
        margin-top: 12px;
      }

      .chart-section {
        padding: 14px 10px;
        min-height: 292px;
      }

      .chart-box {
        height: 228px;
      }

      .modal-backdrop {
        padding: 0;
        align-items: stretch;
      }

      .modal {
        width: 100%;
        max-height: 100svh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .modal-header,
      .modal-footer,
      .score-form {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>GEM JAR</h1>

              <span class="value" id="remaining-gems">131</span>

              <span class="value" id="forecast-date">데이터 필요</span>

              <span class="label">최근 시험</span>

          <h2 class="section-title">과목별 gem <small>최신 기록 기준</small></h2>

    <section class="dashboard" aria-label="대시보드">
      <section class="chart-section wide">
        <h2 class="section-title">전체 gem 추이 <small id="trend-summary">2회차 이상부터 추세 계산</small></h2>
        <div class="chart-box"><canvas id="gem-chart"></canvas></div>
      </section>
      <section class="chart-section">
        <h2 class="section-title">과목별 백분위 비교 <small>목표선 포함</small></h2>
        <div class="chart-box"><canvas id="percentile-chart"></canvas></div>
      </section>
      <section class="chart-section">
        <h2 class="section-title">저장된 시험 <small id="record-count">0회</small></h2>
        <div class="record-list" id="record-list"></div>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">점수 입력</h2>
        <button class="icon-button" id="close-modal" type="button" aria-label="닫기">×</button>
      </div>
      <form class="score-form" id="score-form">
        <div class="form-grid">
          <div class="field">
            <label for="exam-name">시험명</label>
            <input id="exam-name" name="name" type="text" placeholder="6월 모의고사" required>
          </div>
          <div class="field">
            <label for="exam-date">날짜</label>
            <input id="exam-date" name="date" type="date" required>
          </div>
        </div>

        <div class="form-grid" id="subject-fields"></div>

        <div class="modal-footer">
          <div class="form-error" id="form-error" role="status"></div>
          <button class="primary-button" type="submit">저장하고 gem 떨어뜨리기</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const TOTAL_GEMS = 131;
    const EXAM_DAY = new Date("2026-11-19T00:00:00+09:00");
    const STORAGE_KEY = "gemJarTracker.v1";
    const SUBJECTS = {
      korean: { label: "국어", color: "#FF8C42", slots: 28, target: 91, type: "percentile" },
      math: { label: "수학", color: "#4A90D9", slots: 47, target: 98, type: "percentile" },
      english: { label: "영어", color: "#5DBB63", slots: 14, target: 100, type: "english" },
      bioethics: { label: "생윤", color: "#9B59B6", slots: 21, target: 96, type: "percentile" },
      sociology: { label: "사문", color: "#E91E8C", slots: 21, target: 96, type: "percentile" }
    };

    const state = {
      records: [],
      bodies: [],
      engine: null,
      render: null,
      runner: null,
      charts: {},
      audio: null,
      soundEnabled: false
    };

    const $ = (selector) => document.querySelector(selector);
    const subjectKeys = Object.keys(SUBJECTS);

    document.addEventListener("DOMContentLoaded", () => {
      loadState();
      buildSubjectFields();
      bindEvents();
      initDate();
      initMatter();
      renderAll();
      bindSoundUnlock();
      attemptStartupSound();
    });

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{\"records\":[]}");
        state.records = Array.isArray(parsed.records) ? parsed.records : [];
      } catch {
        state.records = [];
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ records: state.records }));
    }

    function bindEvents() {
      $("#open-modal").addEventListener("click", openModal);
      $("#close-modal").addEventListener("click", closeModal);
      $("#modal-backdrop").addEventListener("click", (event) => {
        if (event.target.id === "modal-backdrop") closeModal();
      });
      $("#score-form").addEventListener("submit", handleSubmit);
      $("#demo-fill").addEventListener("click", addSampleRecord);
      $("#energy-burst").addEventListener("click", releaseEnergyBurst);
    }

    function initDate() {
      $("#exam-date").value = new Date().toISOString().slice(0, 10);
    }

    function buildSubjectFields() {
      const fields = $("#subject-fields");
      fields.innerHTML = subjectKeys.map((key) => {
        const subject = SUBJECTS[key];
        if (subject.type === "english") {
          return `
            <fieldset class="subject-card" style="--subject-color:${subject.color}">
              <legend>${subject.label}</legend>
              <div class="field">
                <label for="${key}-grade">등급</label>
                <select id="${key}-grade" name="${key}-grade" required>
                  <option value="1">1등급</option>
                  <option value="2">2등급</option>
                  <option value="3">3등급</option>
                  <option value="4">4등급</option>
                </select>
              </div>
            </fieldset>
          `;
        }
        return `
          <fieldset class="subject-card" style="--subject-color:${subject.color}">
            <legend>${subject.label}</legend>
            <div class="cutoff-grid">
              <div class="field">
                <label for="${key}-raw">원점수</label>
                <input id="${key}-raw" name="${key}-raw" type="number" min="0" max="100" step="1" required>
              </div>
              ${[1, 2, 3, 4].map((grade) => `
                <div class="field">
                  <label for="${key}-cut${grade}">${grade}컷</label>
                  <input id="${key}-cut${grade}" name="${key}-cut${grade}" type="number" min="0" max="100" step="1" required>
                </div>
              `).join("")}
            </div>
          </fieldset>
        `;
      }).join("");
    }

    function openModal() {
      enableSound();
      $("#modal-backdrop").classList.add("open");
      $("#exam-name").focus();
    }

    function closeModal() {
      $("#modal-backdrop").classList.remove("open");
      $("#form-error").textContent = "";
    }

    function handleSubmit(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        const previous = getLatestTotals();
        const record = buildRecord(form);
        state.records.push(record);
        state.records.sort((a, b) => a.date.localeCompare(b.date));
        saveState();
        closeModal();
        renderAll(previous);
        event.currentTarget.reset();
        initDate();
      } catch (error) {
        $("#form-error").textContent = error.message;
      }
    }

    function buildRecord(form) {
      const name = (form.get("name") || "").toString().trim();
      const date = (form.get("date") || "").toString();
      if (!name || !date) throw new Error("시험명과 날짜를 입력해 주세요.");

      const scores = {};
      const gems = {};
      subjectKeys.forEach((key) => {
        const subject = SUBJECTS[key];
        if (subject.type === "english") {
          const grade = Number(form.get(`${key}-grade`));
          if (grade < 1 || grade > 4) throw new Error("영어 등급은 1~4등급만 입력할 수 있습니다.");
          scores[key] = { grade };
          gems[key] = englishGems(grade);
          return;
        }

        const raw = Number(form.get(`${key}-raw`));
        const cutoffs = [1, 2, 3, 4].map((grade) => Number(form.get(`${key}-cut${grade}`)));
        if ([raw, ...cutoffs].some((value) => !Number.isFinite(value))) {
          throw new Error(`${subject.label} 점수와 등급컷을 확인해 주세요.`);
        }
        const percentile = estimatePercentile(raw, cutoffs);
        scores[key] = { raw, cutoffs, percentile };
        gems[key] = percentileToGems(percentile, subject);
      });

      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        date,
        name,
        scores,
        gems
      };
    }

    function estimatePercentile(raw, cutoffs) {
      const anchors = [
        { score: 100, percentile: 100 },
        { score: cutoffs[0], percentile: 96 },
        { score: cutoffs[1], percentile: 89 },
        { score: cutoffs[2], percentile: 77 },
        { score: cutoffs[3], percentile: 60 },
        { score: 0, percentile: 0 }
      ].sort((a, b) => b.score - a.score);

      if (raw >= anchors[0].score) return 100;
      for (let index = 0; index < anchors.length - 1; index += 1) {
        const high = anchors[index];
        const low = anchors[index + 1];
        if (raw <= high.score && raw >= low.score) {
          if (high.score === low.score) return low.percentile;
          const ratio = (raw - low.score) / (high.score - low.score);
          return clamp(low.percentile + ratio * (high.percentile - low.percentile), 0, 100);
        }
      }
      return 0;
    }

    function percentileToGems(percentile, subject) {
      const targetUnits = percentileUnits(subject.target);
      const currentUnits = percentileUnits(clamp(percentile, 0, subject.target));
      return Math.round((currentUnits / targetUnits) * subject.slots);
    }

    function percentileUnits(percentile) {
      const p = Math.max(0, percentile);
      const first = Math.min(p, 70) / 7;
      const second = Math.max(0, Math.min(p, 85) - 70) / 4;
      const third = Math.max(0, p - 85) / 2;
      return first + second + third;
    }

    function englishGems(grade) {
      return ({ 1: 14, 2: 11, 3: 7, 4: 3 })[grade] || 0;
    }

    function getLatestRecord() {
      return state.records.length ? [...state.records].sort((a, b) => a.date.localeCompare(b.date)).at(-1) : null;
    }

    function getLatestTotals() {
      const latest = getLatestRecord();
      if (!latest) return subjectKeys.reduce((acc, key) => ({ ...acc, [key]: 0 }), {});
      return latest.gems;
    }

    function totalGems(record) {
      if (!record) return 0;
      return subjectKeys.reduce((sum, key) => sum + (record.gems[key] || 0), 0);
    }

    function renderAll(previousTotals = null) {
      const latest = getLatestRecord();
      const total = totalGems(latest);
      $("#total-gems").textContent = total;
      $("#progress-rate").textContent = `${Math.round((total / TOTAL_GEMS) * 100)}%`;
      $("#remaining-gems").textContent = Math.max(0, TOTAL_GEMS - total);
      $("#latest-name").textContent = latest ? latest.name : "-";
      $("#last-record").textContent = latest ? `${latest.date} · ${latest.name}` : "아직 저장된 시험이 없습니다.";
      renderSubjectBars(latest);
      renderRecords();
      renderCharts();
      reconcileMatterGems(previousTotals);
    }

    function renderSubjectBars(latest) {
      const container = $("#subject-bars");
      container.innerHTML = subjectKeys.map((key) => {
        const subject = SUBJECTS[key];
        const count = latest ? latest.gems[key] || 0 : 0;
        const percent = Math.min(100, (count / subject.slots) * 100);
        return `
          <div class="subject-row" style="--subject-color:${subject.color}">
            <strong>${subject.label}</strong>
            <div class="bar" aria-label="${subject.label} gem ${count}/${subject.slots}">
              <span style="width:${percent}%"></span>
            </div>
            <span>${count}/${subject.slots}</span>
          </div>
        `;
      }).join("");
    }

    function renderRecords() {
      $("#record-count").textContent = `${state.records.length}회`;
      const list = $("#record-list");
      if (!state.records.length) {
        list.innerHTML = `<div class="empty">점수를 저장하면 기록이 여기에 쌓입니다.</div>`;
        return;
      }
      list.innerHTML = [...state.records].sort((a, b) => b.date.localeCompare(a.date)).map((record) => `
        <article class="record-item">
          <div>
            <strong>${escapeHtml(record.name)}</strong>
            <small>${record.date}</small>
          </div>
          <strong>${totalGems(record)} gem</strong>
          <button class="delete-button" type="button" data-delete="${record.id}" aria-label="${escapeHtml(record.name)} 삭제">삭제</button>
        </article>
      `).join("");
      list.querySelectorAll("[data-delete]").forEach((button) => {
        button.addEventListener("click", () => {
          const previous = getLatestTotals();
          state.records = state.records.filter((record) => record.id !== button.dataset.delete);
          saveState();
          renderAll(previous);
        });
      });
    }

    function renderCharts() {
      if (!window.Chart) return;
      const records = [...state.records].sort((a, b) => a.date.localeCompare(b.date));
      renderGemChart(records);
      renderPercentileChart(records);
    }

    function renderGemChart(records) {
      const ctx = $("#gem-chart");
      state.charts.gem?.destroy();
      const labels = records.map((record) => record.date);
      const totals = records.map(totalGems);
      const datasets = [
        {
          label: "누적 gem",
          data: totals,
          borderColor: "#7fd6ff",
          backgroundColor: "rgba(127, 214, 255, 0.16)",
          pointBackgroundColor: "#ffffff",
          tension: 0.35,
          fill: true
        },
        {
          label: "목표 131",
          data: labels.map(() => TOTAL_GEMS),
          borderColor: "#ffd166",
          borderDash: [7, 7],
          pointRadius: 0
        }
      ];
      const forecast = calculateForecast(records);
      if (forecast && labels.length >= 2) {
        datasets.push({
          label: "선형 추세",
          data: forecast.trend,
          borderColor: "rgba(255,255,255,0.64)",
          borderDash: [3, 5],
          pointRadius: 0
        });
      }
      $("#forecast-date").textContent = forecast?.dateLabel || "데이터 필요";
      $("#trend-summary").textContent = forecast?.summary || "2회차 이상부터 추세 계산";

      state.charts.gem = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: chartOptions({ min: 0, max: TOTAL_GEMS + 10 })
      });
    }

    function renderPercentileChart(records) {
      const ctx = $("#percentile-chart");
      state.charts.percentile?.destroy();
      const labels = records.map((record) => record.date);
      const datasets = subjectKeys.flatMap((key) => {
        const subject = SUBJECTS[key];
        if (subject.type === "english") return [];
        return [
          {
            label: subject.label,
            data: records.map((record) => record.scores[key]?.percentile ?? null),
            borderColor: subject.color,
            backgroundColor: subject.color,
            tension: 0.32
          },
          {
            label: `${subject.label} 목표`,
            data: labels.map(() => subject.target),
            borderColor: subject.color,
            borderDash: [5, 6],
            pointRadius: 0,
            borderWidth: 1
          }
        ];
      });
      state.charts.percentile = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: chartOptions({ min: 0, max: 100 })
      });
    }

    function chartOptions(scale) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: "#dbeafe", boxWidth: 12, boxHeight: 12 } },
          tooltip: {
            backgroundColor: "rgba(7, 10, 18, 0.94)",
            borderColor: "rgba(177, 210, 255, 0.22)",
            borderWidth: 1
          }
        },
        scales: {
          x: { ticks: { color: "#9ba9bd" }, grid: { color: "rgba(177,210,255,0.08)" } },
          y: { min: scale.min, max: scale.max, ticks: { color: "#9ba9bd" }, grid: { color: "rgba(177,210,255,0.08)" } }
        }
      };
    }

    function calculateForecast(records) {
      if (records.length < 2) return null;
      const first = records[0];
      const last = records.at(-1);
      const firstDate = new Date(`${first.date}T00:00:00+09:00`);
      const lastDate = new Date(`${last.date}T00:00:00+09:00`);
      const days = Math.max(1, (lastDate - firstDate) / 86400000);
      const slope = (totalGems(last) - totalGems(first)) / days;
      if (slope <= 0) {
        return { dateLabel: "속도 부족", summary: "gem 증가 속도가 아직 양수 추세가 아닙니다.", trend: records.map(totalGems) };
      }
      const remaining = TOTAL_GEMS - totalGems(last);
      const daysToGoal = remaining / slope;
      const forecastDate = new Date(lastDate.getTime() + daysToGoal * 86400000);
      const dateLabel = forecastDate.toISOString().slice(0, 10);
      const byExamDay = forecastDate <= EXAM_DAY ? "수능 전 도달 가능" : "수능 이후 도달 예상";
      const trend = records.map((record) => {
        const current = new Date(`${record.date}T00:00:00+09:00`);
        const dayFromFirst = Math.max(0, (current - firstDate) / 86400000);
        return Math.max(0, Math.round(totalGems(first) + slope * dayFromFirst));
      });
      return {
        dateLabel,
        summary: `${dateLabel} · ${byExamDay}`,
        trend
      };
    }

    function initMatter() {
      const canvas = $("#jar-canvas");
      if (!window.Matter) {
        canvas.getContext("2d").fillStyle = "rgba(127, 214, 255, 0.12)";
        canvas.getContext("2d").fillRect(0, 0, canvas.width, canvas.height);
        return;
      }
      const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
      state.engine = Engine.create();
      state.engine.gravity.y = 0.82;
      state.render = Render.create({
        canvas,
        engine: state.engine,
        options: {
          width: 430,
          height: 550,
          wireframes: false,
          background: "transparent",
          pixelRatio: window.devicePixelRatio || 1
        }
      });
      state.runner = Runner.create();
      const walls = [
        Bodies.rectangle(215, 526, 258, 40, wallOptions()),
        Bodies.rectangle(62, 348, 44, 352, { ...wallOptions(), angle: -0.035 }),
        Bodies.rectangle(368, 348, 44, 352, { ...wallOptions(), angle: 0.035 }),
        Bodies.rectangle(103, 145, 42, 142, { ...wallOptions(), angle: 0.34 }),
        Bodies.rectangle(327, 145, 42, 142, { ...wallOptions(), angle: -0.34 }),
        Bodies.rectangle(142, 78, 38, 86, wallOptions()),
        Bodies.rectangle(288, 78, 38, 86, wallOptions())
      ];
      Composite.add(state.engine.world, walls);
      Events.on(state.render, "afterRender", drawGems);
      Events.on(state.engine, "beforeUpdate", containEscapedGems);
      Events.on(state.engine, "collisionStart", handleGemCollisions);
      Render.run(state.render);
      Runner.run(state.runner, state.engine);
    }

    function wallOptions() {
      return {
        isStatic: true,
        render: { fillStyle: "rgba(255,255,255,0)" },
        friction: 0.28,
        restitution: 0.03
      };
    }

    function containEscapedGems() {
      if (!window.Matter) return;
      state.bodies.forEach((body) => {
        if (body.position.y > 548) {
          Matter.Body.setPosition(body, { x: clamp(body.position.x, 120, 310), y: 486 });
          Matter.Body.setVelocity(body, { x: 0, y: -1.2 });
        }
        if (body.position.x < 78) {
          Matter.Body.setPosition(body, { x: 96, y: body.position.y });
          Matter.Body.setVelocity(body, { x: Math.abs(body.velocity.x) * 0.2, y: body.velocity.y * 0.4 });
        }
        if (body.position.x > 352) {
          Matter.Body.setPosition(body, { x: 334, y: body.position.y });
          Matter.Body.setVelocity(body, { x: -Math.abs(body.velocity.x) * 0.2, y: body.velocity.y * 0.4 });
        }
        if (body.position.y < 132 && (body.position.x < 142 || body.position.x > 288)) {
          Matter.Body.setPosition(body, { x: clamp(body.position.x, 154, 276), y: body.position.y + 10 });
          Matter.Body.setVelocity(body, { x: 0, y: Math.max(1.4, body.velocity.y) });
        }
      });
    }

    function reconcileMatterGems(previousTotals = null) {
      if (!window.Matter || !state.engine) return;
      const targetTotals = getLatestTotals();
      const targetCount = subjectKeys.reduce((sum, key) => sum + targetTotals[key], 0);
      const currentCount = state.bodies.length;
      if (!previousTotals || targetCount < currentCount) {
        clearGems();
        subjectKeys.forEach((key) => spawnGems(key, targetTotals[key], false));
        return;
      }
      subjectKeys.forEach((key) => {
        const delta = Math.max(0, (targetTotals[key] || 0) - (previousTotals[key] || 0));
        if (delta) spawnGems(key, delta, true);
      });
    }

    function clearGems() {
      if (!window.Matter || !state.engine) return;
      Matter.Composite.remove(state.engine.world, state.bodies);
      state.bodies = [];
    }

    function spawnGems(key, count, animated) {
      if (!window.Matter || !state.engine || count <= 0) return;
      const { Bodies, Composite } = Matter;
      const subject = SUBJECTS[key];
      const newBodies = [];
      for (let index = 0; index < count; index += 1) {
        const radius = 11.5;
        const x = 170 + Math.random() * 90;
        const y = animated ? -24 - index * 14 : 205 + Math.random() * 270;
        const sides = 6;
        const gem = Bodies.polygon(x, y, sides, radius, {
          restitution: 0.18,
          friction: 0.08,
          frictionAir: 0.018,
          density: 0.0031,
          render: {
            visible: false
          }
        });
        gem.subjectKey = key;
        gem.gemColor = subject.color;
        newBodies.push(gem);
      }
      Composite.add(state.engine.world, newBodies);
      state.bodies.push(...newBodies);
      if (animated) playGemSound(0.52, 760);
    }

    function releaseEnergyBurst() {
      enableSound();
      if (!window.Matter || !state.bodies.length) {
        playGemSound(0.34, 520);
        return;
      }

      const stage = $(".jar-stage");
      stage.classList.remove("energy-pulse");
      void stage.offsetWidth;
      stage.classList.add("energy-pulse");

      const center = { x: 215, y: 430 };
      state.bodies.forEach((body, index) => {
        const dx = body.position.x - center.x;
        const dy = body.position.y - center.y;
        const distance = Math.max(42, Math.hypot(dx, dy));
        const spread = index % 2 === 0 ? 1 : -1;
        const force = {
          x: (dx / distance) * 0.018 + spread * (0.004 + Math.random() * 0.006),
          y: -0.032 - Math.random() * 0.018
        };
        Matter.Body.applyForce(body, body.position, force);
        Matter.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.46);
      });

      [0, 70, 140, 220].forEach((delay, index) => {
        window.setTimeout(() => playGemSound(0.48 - index * 0.07, 420 + index * 170), delay);
      });
    }

    function drawGems() {
      const context = state.render?.context;
      if (!context) return;
      state.bodies.forEach((body) => {
        const vertices = body.vertices;
        const bounds = body.bounds;
        const cx = body.position.x;
        const cy = body.position.y;
        const color = body.gemColor || "#7fd6ff";

        context.save();
        context.beginPath();
        vertices.forEach((vertex, index) => {
          if (index === 0) context.moveTo(vertex.x, vertex.y);
          else context.lineTo(vertex.x, vertex.y);
        });
        context.closePath();

        const fill = context.createLinearGradient(bounds.min.x, bounds.min.y, bounds.max.x, bounds.max.y);
        fill.addColorStop(0, hexToRgba("#ffffff", 0.88));
        fill.addColorStop(0.18, hexToRgba(color, 0.92));
        fill.addColorStop(0.58, hexToRgba(color, 0.68));
        fill.addColorStop(1, hexToRgba("#06111f", 0.84));
        context.shadowColor = hexToRgba(color, 0.42);
        context.shadowBlur = 10;
        context.fillStyle = fill;
        context.fill();

        context.clip();
        vertices.forEach((vertex, index) => {
          const next = vertices[(index + 1) % vertices.length];
          context.beginPath();
          context.moveTo(cx, cy);
          context.lineTo(vertex.x, vertex.y);
          context.lineTo(next.x, next.y);
          context.closePath();
          context.fillStyle = index % 2 === 0 ? "rgba(255,255,255,0.18)" : "rgba(0,0,0,0.16)";
          context.fill();
        });

        const shine = context.createRadialGradient(cx - 4, cy - 5, 1, cx - 4, cy - 5, 13);
        shine.addColorStop(0, "rgba(255,255,255,0.82)");
        shine.addColorStop(0.35, "rgba(255,255,255,0.24)");
        shine.addColorStop(1, "rgba(255,255,255,0)");
        context.fillStyle = shine;
        context.fillRect(bounds.min.x, bounds.min.y, bounds.max.x - bounds.min.x, bounds.max.y - bounds.min.y);

        context.restore();
        context.save();
        context.beginPath();
        vertices.forEach((vertex, index) => {
          if (index === 0) context.moveTo(vertex.x, vertex.y);
          else context.lineTo(vertex.x, vertex.y);
        });
        context.closePath();
        context.lineWidth = 1.15;
        context.strokeStyle = "rgba(255,255,255,0.72)";
        context.stroke();
        context.restore();
      });
    }

    function handleGemCollisions(event) {
      if (!state.soundEnabled) return;
      event.pairs.forEach((pair) => {
        if (pair.bodyA.isStatic && pair.bodyB.isStatic) return;
        const speed = Math.max(pair.bodyA.speed || 0, pair.bodyB.speed || 0);
        if (speed < 0.72) return;
        playGemSound(clamp(speed / 9, 0.12, 0.58), 150 + Math.random() * 90);
      });
    }

    function bindSoundUnlock() {
      const unlock = () => {
        enableSound();
        playGemSound(0.2, 180);
        window.removeEventListener("pointerdown", unlock);
        window.removeEventListener("keydown", unlock);
      };
      window.addEventListener("pointerdown", unlock, { once: true });
      window.addEventListener("keydown", unlock, { once: true });
    }

    function attemptStartupSound() {
      window.setTimeout(() => {
        enableSound();
        playGemSound(0.22, 170);
      }, 260);
    }

    function enableSound() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      state.audio ||= new AudioContext();
      if (state.audio.state === "suspended") state.audio.resume();
      state.soundEnabled = true;
    }

    function playGemSound(volume = 0.4, baseFrequency = 180) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      state.audio ||= new AudioContext();
      if (state.audio.state === "suspended") state.audio.resume();
      const now = state.audio.currentTime;
      const master = state.audio.createGain();
      master.gain.setValueAtTime(Math.min(0.9, volume), now);
      master.connect(state.audio.destination);

      const low = state.audio.createOscillator();
      const lowGain = state.audio.createGain();
      const lowFilter = state.audio.createBiquadFilter();
      low.type = "sine";
      low.frequency.setValueAtTime(baseFrequency, now);
      low.frequency.exponentialRampToValueAtTime(Math.max(55, baseFrequency * 0.46), now + 0.16);
      lowFilter.type = "lowpass";
      lowFilter.frequency.value = 520;
      lowGain.gain.setValueAtTime(0.0001, now);
      lowGain.gain.exponentialRampToValueAtTime(0.18, now + 0.012);
      lowGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      low.connect(lowFilter);
      lowFilter.connect(lowGain);
      lowGain.connect(master);
      low.start(now);
      low.stop(now + 0.24);

      const noiseBuffer = state.audio.createBuffer(1, Math.floor(state.audio.sampleRate * 0.09), state.audio.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const noise = state.audio.createBufferSource();
      const noiseGain = state.audio.createGain();
      const noiseFilter = state.audio.createBiquadFilter();
      noise.buffer = noiseBuffer;
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 950 + Math.random() * 420;
      noiseFilter.Q.value = 1.9;
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.22, now + 0.006);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.085);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);
      noise.start(now);
      noise.stop(now + 0.1);

      [0, 0.028, 0.061].forEach((offset, index) => {
        const ring = state.audio.createOscillator();
        const ringGain = state.audio.createGain();
        const ringFilter = state.audio.createBiquadFilter();
        ring.type = "triangle";
        ring.frequency.value = 360 + index * 115 + Math.random() * 80;
        ringFilter.type = "bandpass";
        ringFilter.frequency.value = ring.frequency.value * 1.9;
        ringFilter.Q.value = 5.4;
        ringGain.gain.setValueAtTime(0.0001, now + offset);
        ringGain.gain.exponentialRampToValueAtTime(0.055, now + offset + 0.006);
        ringGain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.13);
        ring.connect(ringFilter);
        ringFilter.connect(ringGain);
        ringGain.connect(master);
        ring.start(now + offset);
        ring.stop(now + offset + 0.15);
      });
    }

    function addSampleRecord() {
      enableSound();
      const previous = getLatestTotals();
      const sampleIndex = state.records.length + 1;
      const sampleDate = new Date();
      sampleDate.setDate(sampleDate.getDate() + sampleIndex * 14);
      const make = (raw, cutoffs, key) => {
        const percentile = estimatePercentile(raw, cutoffs);
        return {
          score: { raw, cutoffs, percentile },
          gems: percentileToGems(percentile, SUBJECTS[key])
        };
      };
      const korean = make(78 + sampleIndex * 2, [92, 84, 74, 61], "korean");
      const math = make(82 + sampleIndex * 2, [96, 88, 76, 63], "math");
      const bioethics = make(40 + sampleIndex, [47, 42, 35, 28], "bioethics");
      const sociology = make(39 + sampleIndex, [47, 42, 35, 28], "sociology");
      const grade = Math.max(1, 4 - Math.floor(sampleIndex / 2));
      state.records.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        date: sampleDate.toISOString().slice(0, 10),
        name: `${sampleIndex}회차 샘플`,
        scores: {
          korean: korean.score,
          math: math.score,
          english: { grade },
          bioethics: bioethics.score,
          sociology: sociology.score
        },
        gems: {
          korean: korean.gems,
          math: math.gems,
          english: englishGems(grade),
          bioethics: bioethics.gems,
          sociology: sociology.gems
        }
      });
      state.records.sort((a, b) => a.date.localeCompare(b.date));
      saveState();
      renderAll(previous);
    }

    function hexToRgba(hex, alpha) {
      const normalized = hex.replace("#", "");
      const value = parseInt(normalized, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }
  </script>
