<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>glassjar alpha 0.4.4.7</title>
  <style>
    :root{--bg:#000;--line:#fff;--text:#fff;--muted:#b8b8b8;--font:"SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font)}
    .wrap{width:min(1080px,100%);margin:0 auto;padding:24px;display:grid;gap:14px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px}
    .top-right{display:grid;justify-items:end;gap:8px}
    h1,h2,h3,p{margin:0}
    h1{font-size:30px;line-height:1}
    h2{font-size:15px;margin-bottom:10px}
    h3{font-size:14px;margin-bottom:8px}
    .subtitle,.muted{color:var(--muted)}
    .subtitle{margin-top:6px;font-size:13px}
    .stamp,.log{color:var(--muted);font:13px/1.55 var(--font)}
    .main-grid{display:grid;grid-template-columns:520px 1fr;gap:14px;align-items:start}
    .side-stack{display:grid;gap:14px}
    .panel{border:1px solid var(--line);padding:14px}
    .prediction-panel{position:relative}
    .panel-head{margin-bottom:10px}
    .prediction-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding-right:150px}
    .prediction-head h2{margin-bottom:0}
    .panel-actions{display:grid;gap:8px;margin-bottom:10px}
    .engine-label{position:absolute;right:14px;top:16px;color:#777;font:12px/1 var(--font);white-space:nowrap}
    .controls,.subject-inputs,.records{display:grid;gap:10px}
    .form-shell{display:grid;gap:10px;border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
    .form-shell.hidden{display:none}
    .form-error{color:var(--muted);font:13px/1.4 var(--font);min-height:18px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cut-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
    .percentile-grid{display:grid;grid-template-columns:minmax(120px,220px);gap:8px;margin-top:8px}
    .percentile-grid.hidden,.cut-grid.hidden{display:none}
    label{display:grid;gap:5px;color:var(--muted);font-size:12px}
    .field-note{color:#777;font-size:11px;line-height:1.35}
    .checkline{display:flex;align-items:center;gap:8px;color:var(--text);font-size:13px}
    .checkline input{appearance:none;width:15px;height:15px;padding:0;border:1px solid var(--line);background:#000;display:grid;place-items:center}
    .checkline input:checked::after{content:"";width:7px;height:7px;background:#fff;display:block}
    input,button,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:0;background:#000;color:var(--text);font:inherit}
    input:disabled,select:disabled{border-color:#555;color:#666}
    button{cursor:pointer;font-weight:700}
    button:hover{background:#fff;color:#000}
    .settings-button{width:auto;border:0;padding:0;background:transparent;color:var(--text);display:flex;align-items:center;gap:6px;font-size:13px}
    .settings-button:hover{background:transparent;color:var(--muted)}
    .settings-button svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,max-content));gap:10px;align-items:stretch}
    .prediction-kpi{grid-template-columns:repeat(auto-fit,minmax(136px,max-content));align-items:start;margin-bottom:14px}
    .prediction-kpi .card{min-width:136px}
    .card{border:1px solid var(--line);padding:12px;min-height:74px}
    .card p{color:var(--muted);font-size:12px;margin-bottom:8px}
    .value{font:800 22px/1.1 var(--font);word-break:keep-all;white-space:normal}
    .pace-value{display:flex;align-items:center;gap:8px;font:800 18px/1.2 var(--font)}
    .pace-trend{color:var(--muted);font:12px/1.2 var(--font);margin-top:6px}
    .pace-icon{width:18px;height:18px;display:inline-grid;place-items:center;color:#fff;flex:0 0 auto}
    .pace-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .pace-icon.star svg{fill:currentColor;stroke:currentColor}
    .subject-card{border:1px solid var(--line);padding:10px;min-width:0}
    .subject-options{display:flex;align-items:center;flex-wrap:wrap;gap:10px 14px;margin-bottom:8px}
    .subject-options .checkline{white-space:nowrap}
    .subject-card.off{border-color:#555}
    .subject-bars{display:grid;gap:8px;margin-top:10px}
    .subject-row{display:grid;grid-template-columns:52px 1fr 64px;gap:8px;align-items:center;font-size:13px}
    .bar{height:10px;border:1px solid var(--line);background:#000}
    .bar span{display:block;height:100%;background:#fff}
    .record{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;border:1px solid var(--line);padding:9px;font-size:13px}
    .record small{display:block;color:var(--muted);margin-top:3px}
    .record button{padding:7px 9px}
    #new-record-slot:not(:empty){margin-bottom:10px}
    .record-form-slot{min-width:0}
    .record-form-slot:empty{display:none}
    .record-form-slot .form-shell{border:1px solid var(--line);margin:0 0 4px;padding:12px}
    .editing-mark{color:#777;font-size:11px;font-weight:500;margin-left:6px}
    .log{white-space:pre-wrap}
    .prediction-panel .log{min-height:0}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:grid;place-items:start center;padding:72px 18px;z-index:10}
    .modal.hidden{display:none}
    .settings-panel{width:min(720px,100%);max-height:calc(100vh - 120px);overflow:auto;background:#000;border:1px solid var(--line);padding:14px;display:grid;gap:12px}
    .settings-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .settings-head h2{margin:0}
    .icon-button{width:auto;padding:7px 10px}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    details{border-top:1px solid var(--line);padding-top:10px}
    summary{cursor:pointer;font-weight:700;margin-bottom:10px}
    @media (max-width:960px){.main-grid,.row,.cut-grid,.percentile-grid{grid-template-columns:1fr}.top{align-items:start;display:grid;grid-template-columns:auto minmax(0,1fr)}.top-right{justify-items:end;text-align:right}.stamp{font-size:12px;line-height:1.35}.main-grid>aside{order:2}.side-stack{order:1}.kpi{grid-template-columns:repeat(auto-fit,minmax(128px,1fr))}.prediction-head{padding-right:0}.engine-label{position:static}.record{grid-template-columns:1fr}}
    @media (max-width:640px){.settings-grid{grid-template-columns:1fr}.wrap{padding:18px}.top{gap:10px}.settings-button{font-size:12px}.settings-button svg{width:15px;height:15px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div>
        <h1>glassjar</h1>
        <p class="subtitle">alpha 0.4.4.7</p>
      </div>
      <div class="top-right">
        <button class="settings-button" id="open-settings" type="button" aria-haspopup="dialog">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-2 .1 7.7 7.7 0 0 1-1.7.7 1.7 1.7 0 0 0-1.2 1.5V23H8.8v-.4A1.7 1.7 0 0 0 7.6 21a7.7 7.7 0 0 1-1.7-.7 1.7 1.7 0 0 0-2-.1l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 2.1 15a7.5 7.5 0 0 1 0-2 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-3.4.2.1a1.7 1.7 0 0 0 2-.1 7.7 7.7 0 0 1 1.7-.7 1.7 1.7 0 0 0 1.2-1.5V5h3.9v.4A1.7 1.7 0 0 0 13.9 7a7.7 7.7 0 0 1 1.7.7 1.7 1.7 0 0 0 2 .1l.2-.1 2 3.4-.1.1a1.7 1.7 0 0 0-.3 1.9 7.5 7.5 0 0 1 0 2z"></path></svg>
          환경설정
        </button>
        <p class="stamp" id="countdown">수능까지 --일 --시간 --분 --초 남음</p>
      </div>
    </header>

    <section class="main-grid">
      <aside class="panel">
        <div class="panel-head">
          <h2>저장된 시험</h2>
        </div>
        <div class="panel-actions">
          <button id="add-record" type="button">+ 기록 추가</button>
        </div>
        <div id="new-record-slot"></div>
        <div class="records" id="record-list"></div>
        <div class="form-shell hidden" id="form-shell">
          <form class="controls" id="score-form">
            <div class="row">
              <label>
                시험명
                <input id="exam-name" name="name" type="text" value="모의고사" required>
              </label>
              <label>
                날짜
                <input id="exam-date" name="date" type="date" required>
              </label>
            </div>
            <div class="subject-inputs" id="subject-fields"></div>
            <div class="form-error" id="form-error"></div>
            <div class="row">
              <button id="submit-button" type="submit">저장</button>
              <button id="cancel-edit" type="button">닫기</button>
            </div>
          </form>
        </div>
      </aside>

      <div class="side-stack">
        <section class="panel prediction-panel">
          <h2>목표 현황</h2>
          <div class="kpi">
            <div class="card">
              <p>gem</p>
              <div class="value" id="total-gems">0/131</div>
            </div>
            <div class="card">
              <p>페이스</p>
              <div class="pace-value" id="pace-status"></div>
              <div class="pace-trend" id="pace-trend"></div>
            </div>
            <div class="card">
              <p>달성률</p>
              <div class="value" id="progress-rate">0%</div>
            </div>
          </div>
          <div class="subject-bars" id="subject-bars"></div>
        </section>

        <section class="panel prediction-panel">
          <div class="panel-head prediction-head">
            <h2>예측</h2>
            <span class="engine-label" id="engine-label">Mandarin 1.1 Standard</span>
          </div>
          <div class="kpi prediction-kpi">
            <div class="card">
              <p>목표 예상일</p>
              <div class="value" id="forecast-date">-</div>
            </div>
            <div class="card">
              <p>신뢰도</p>
              <div class="value" id="confidence">-</div>
            </div>
            <div class="card">
              <p>병목</p>
              <div class="value" id="bottleneck">-</div>
            </div>
          </div>
          <div class="log" id="forecast-log"></div>
        </section>

      </div>
    </section>

  </main>

  <div class="modal hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <section class="settings-panel">
      <div class="settings-head">
        <h2 id="settings-title">환경설정</h2>
        <button class="icon-button" id="close-settings" type="button">닫기</button>
      </div>
      <form class="controls" id="settings-form">
        <section>
          <h3>목표</h3>
          <div class="settings-grid" id="target-settings"></div>
        </section>
        <section>
          <h3>탐구 별명</h3>
          <div class="settings-grid">
            <label>탐구1<input name="alias-bioethics" type="text"><span class="field-note">입력 폼, 목표 현황, 병목 표시에 쓰이는 과목 이름입니다.</span></label>
            <label>탐구2<input name="alias-sociology" type="text"><span class="field-note">입력 폼, 목표 현황, 병목 표시에 쓰이는 과목 이름입니다.</span></label>
          </div>
        </section>
        <details>
          <summary>고급 설정</summary>
          <div class="controls">
            <section>
              <h3>과목별 비율</h3>
              <div class="settings-grid" id="slot-settings"></div>
            </section>
            <section>
              <h3>예측 파라미터</h3>
              <div class="settings-grid">
                <label>목표 완료 여유일<input name="target-buffer-days" type="number" min="0" max="60" step="1"><span class="field-note">수능 며칠 전까지 100% 도달로 볼지 정합니다. 기본값 7일.</span></label>
              </div>
            </section>
          </div>
        </details>
        <div class="form-error" id="settings-error"></div>
        <div class="row">
          <button type="submit">저장</button>
          <button id="reset-settings" type="button">기본값</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    const EXAM_DAY = new Date("2026-11-19T00:00:00+09:00");
    const ENGINE_GAMMA = 1.25;
    const ENGINE_NAME = "Mandarin 1.1 Standard";
    const STORAGE_KEY = "glassjar.0.4.4.7";
    const DEFAULT_SUBJECTS = {
      korean: { label: "국어", slots: 28, target: 91, type: "percentile" },
      math: { label: "수학", slots: 47, target: 98, type: "percentile" },
      english: { label: "영어", slots: 14, target: 100, type: "english" },
      bioethics: { label: "탐구1", slots: 21, target: 96, type: "percentile" },
      sociology: { label: "탐구2", slots: 21, target: 96, type: "percentile" }
    };
    const DEFAULT_SETTINGS = {
      targets: { korean: 91, math: 98, bioethics: 96, sociology: 96 },
      aliases: { bioethics: "생윤", sociology: "사문" },
      slots: { korean: 28, math: 47, english: 14, bioethics: 21, sociology: 21 },
      targetBufferDays: 7
    };

    let SUBJECTS = buildSubjects(DEFAULT_SETTINGS);
    const state = { records: [], editingId: null, isCreating: false, settings: cloneSettings(DEFAULT_SETTINGS) };
    const subjectKeys = Object.keys(SUBJECTS);
    const $ = (selector) => document.querySelector(selector);

    document.addEventListener("DOMContentLoaded", () => {
      migrateState();
      loadState();
      applySettings();
      buildSettingsFields();
      buildSubjectFields();
      initDate();
      bindEvents();
      resetForm();
      $("#engine-label").textContent = ENGINE_NAME;
      render();
      tickCountdown();
      setInterval(tickCountdown, 1000);
    });

    function migrateState() {
      if (localStorage.getItem(STORAGE_KEY)) return;
      const old = localStorage.getItem("glassjar.0.4.4.6a") || localStorage.getItem("glassjar.0.4.4.6") || localStorage.getItem("glassjar.0.4.4.5") || localStorage.getItem("glassjar.0.4.4.4") || localStorage.getItem("glassjar.0.4.4.3") || localStorage.getItem("glassjar.0.4.4.2") || localStorage.getItem("glassjar.0.4.4.1") || localStorage.getItem("glassjar.0.4.4") || localStorage.getItem("glassjar.0.4.3.4") || localStorage.getItem("glassjar.0.4.3.3") || localStorage.getItem("glassjar.0.4.3.2") || localStorage.getItem("glassjar.0.4.3.1") || localStorage.getItem("glassjar.0.4.3") || localStorage.getItem("glassjar.0.4.2.2") || localStorage.getItem("glassjar.0.4.2.1") || localStorage.getItem("glassjar.0.4.2") || localStorage.getItem("glassjar.0.4.1.1") || localStorage.getItem("glassjar.0.4.1") || localStorage.getItem("glassjar.0.4.0") || localStorage.getItem("glassjar.0.3.1") || localStorage.getItem("glassjar.0.3.0") || localStorage.getItem("glassjar.0.2.4.3") || localStorage.getItem("glassjar.0.2.4.2") || localStorage.getItem("glassjar.0.2.4.1") || localStorage.getItem("glassjar.0.2.4") || localStorage.getItem("glassjar.0.2.3") || localStorage.getItem("glassjar.0.2.2") || localStorage.getItem("glassjar.0.2.1") || localStorage.getItem("glassjar.0.2.0") || localStorage.getItem("glassjar.0.1.5.1") || localStorage.getItem("glassjar.0.1.5") || localStorage.getItem("glassjar.0.1.4") || localStorage.getItem("glassjar.0.1.3");
      if (old) localStorage.setItem(STORAGE_KEY, old);
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{\"records\":[]}");
        state.records = Array.isArray(parsed.records) ? parsed.records : [];
        state.settings = normalizeSettings(parsed.settings || DEFAULT_SETTINGS);
      } catch {
        state.records = [];
        state.settings = cloneSettings(DEFAULT_SETTINGS);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ records: state.records, settings: state.settings }));
    }

    function cloneSettings(settings) {
      return JSON.parse(JSON.stringify(settings));
    }

    function normalizeSettings(settings) {
      const merged = cloneSettings(DEFAULT_SETTINGS);
      subjectKeys.forEach((key) => {
        if (Number.isFinite(Number(settings.slots?.[key]))) {
          merged.slots[key] = clamp(Number(settings.slots[key]), 1, 100);
        }
      });
      ["korean", "math", "bioethics", "sociology"].forEach((key) => {
        if (Number.isFinite(Number(settings.targets?.[key]))) {
          merged.targets[key] = clamp(Number(settings.targets[key]), 1, 100);
        }
      });
      ["bioethics", "sociology"].forEach((key) => {
        const alias = String(settings.aliases?.[key] || "").trim();
        if (alias) merged.aliases[key] = alias.slice(0, 12);
      });
      if (Number.isFinite(Number(settings.targetBufferDays))) {
        merged.targetBufferDays = Math.round(clamp(Number(settings.targetBufferDays), 0, 60));
      }
      return merged;
    }

    function applySettings() {
      SUBJECTS = buildSubjects(state.settings);
    }

    function buildSubjects(settings) {
      const subjects = cloneSettings(DEFAULT_SUBJECTS);
      Object.keys(subjects).forEach((key) => {
        subjects[key].slots = Number(settings.slots[key]);
      });
      ["korean", "math", "bioethics", "sociology"].forEach((key) => {
        subjects[key].target = Number(settings.targets[key]);
      });
      return subjects;
    }

    function totalGemSlots() {
      return subjectKeys.reduce((sum, key) => sum + SUBJECTS[key].slots, 0);
    }

    function targetDay() {
      return new Date(EXAM_DAY.getTime() - state.settings.targetBufferDays * 86400000);
    }

    function settingsSubjectLabel(key) {
      const label = SUBJECTS[key].label;
      const alias = state.settings.aliases[key];
      return alias ? `${label}(${alias})` : label;
    }

    function appSubjectLabel(key) {
      return state.settings.aliases[key] || SUBJECTS[key].label;
    }

    function settingsSubjectLabelHtml(key) {
      return escapeHtml(settingsSubjectLabel(key));
    }

    function appSubjectLabelHtml(key) {
      return escapeHtml(appSubjectLabel(key));
    }

    function buildSettingsFields() {
      $("#target-settings").innerHTML = ["korean", "math", "bioethics", "sociology"].map((key) => `
        <label>${settingsSubjectLabelHtml(key)} 목표 백분위<input name="target-${key}" type="number" min="1" max="100" step="1"><span class="field-note">이 과목에서 100% 달성으로 간주할 목표 백분위입니다. gem 환산과 남은 진척도에 반영됩니다.</span></label>
      `).join("");
      $("#slot-settings").innerHTML = subjectKeys.map((key) => `
        <label>${settingsSubjectLabelHtml(key)} gem 비율<input name="slot-${key}" type="number" min="1" max="100" step="1"><span class="field-note">전체 gem 중 이 과목이 차지하는 무게입니다. 목표 현황과 페이스 계산 비중이 함께 바뀝니다.</span></label>
      `).join("");
      fillSettingsForm();
    }

    function fillSettingsForm() {
      ["korean", "math", "bioethics", "sociology"].forEach((key) => {
        document.querySelector(`[name="target-${key}"]`).value = state.settings.targets[key];
      });
      subjectKeys.forEach((key) => {
        document.querySelector(`[name="slot-${key}"]`).value = state.settings.slots[key];
      });
      document.querySelector(`[name="alias-bioethics"]`).value = state.settings.aliases.bioethics;
      document.querySelector(`[name="alias-sociology"]`).value = state.settings.aliases.sociology;
      document.querySelector(`[name="target-buffer-days"]`).value = state.settings.targetBufferDays;
      $("#settings-error").textContent = "";
    }

    function buildSubjectFields() {
      $("#subject-fields").innerHTML = subjectKeys.map((key) => {
        const subject = SUBJECTS[key];
        const label = appSubjectLabelHtml(key);
        if (subject.type === "english") {
          return `
            <section class="subject-card" data-subject="${key}">
              <label class="checkline"><input name="${key}-taken" type="checkbox" checked> ${label} 응시</label>
              <label>
                등급
                <select name="${key}-grade">
                  ${[1,2,3,4,5,6,7,8,9].map((grade) => `<option value="${grade}">${grade}등급</option>`).join("")}
                </select>
              </label>
            </section>
          `;
        }
        return `
              <section class="subject-card" data-subject="${key}">
            <div class="subject-options">
              <label class="checkline"><input name="${key}-taken" type="checkbox" checked> ${label} 응시</label>
              <label class="checkline"><input name="${key}-skip4" type="checkbox"> 4컷 생략</label>
              <label class="checkline"><input name="${key}-direct-percentile" type="checkbox"> 백분위로 입력</label>
            </div>
            <div class="cut-grid" data-cut-grid="${key}">
              <label>원점수<input name="${key}-raw" type="number" min="0" max="100" step="1"></label>
              <label>1컷<input name="${key}-cut1" type="number" min="0" max="100" step="1"></label>
              <label>2컷<input name="${key}-cut2" type="number" min="0" max="100" step="1"></label>
              <label>3컷<input name="${key}-cut3" type="number" min="0" max="100" step="1"></label>
              <label>4컷<input name="${key}-cut4" type="number" min="0" max="100" step="1"></label>
            </div>
            <div class="percentile-grid hidden" data-percentile-grid="${key}">
              <label>백분위<input name="${key}-percentile" type="number" min="0" max="100" step="0.1"></label>
            </div>
          </section>
        `;
      }).join("");
      subjectKeys.forEach((key) => syncSubjectEnabled(key));
    }

    function initDate() {
      $("#exam-date").value = new Date().toISOString().slice(0, 10);
    }

    function bindEvents() {
      $("#add-record").addEventListener("click", openNewRecord);
      $("#score-form").addEventListener("submit", handleSubmit);
      $("#cancel-edit").addEventListener("click", resetForm);
      $("#open-settings").addEventListener("click", openSettings);
      $("#close-settings").addEventListener("click", closeSettings);
      $("#settings-modal").addEventListener("click", (event) => {
        if (event.target.id === "settings-modal") closeSettings();
      });
      $("#settings-form").addEventListener("submit", handleSettingsSubmit);
      $("#reset-settings").addEventListener("click", resetSettings);
      bindSubjectEvents();
    }

    function bindSubjectEvents() {
      subjectKeys.forEach((key) => {
        document.querySelector(`[name="${key}-taken"]`).addEventListener("change", () => syncSubjectEnabled(key));
        document.querySelector(`[name="${key}-skip4"]`)?.addEventListener("change", () => syncSubjectEnabled(key));
        document.querySelector(`[name="${key}-direct-percentile"]`)?.addEventListener("change", () => syncSubjectEnabled(key));
      });
    }

    function openSettings() {
      fillSettingsForm();
      $("#settings-modal").classList.remove("hidden");
    }

    function closeSettings() {
      $("#settings-modal").classList.add("hidden");
    }

    function handleSettingsSubmit(event) {
      event.preventDefault();
      try {
        state.settings = readSettingsForm(new FormData(event.currentTarget));
        applySettings();
        saveState();
        buildSettingsFields();
        buildSubjectFields();
        bindSubjectEvents();
        resetForm();
        render();
        closeSettings();
      } catch (error) {
        $("#settings-error").textContent = error.message;
      }
    }

    function resetSettings() {
      state.settings = cloneSettings(DEFAULT_SETTINGS);
      applySettings();
      saveState();
      buildSettingsFields();
      buildSubjectFields();
      bindSubjectEvents();
      resetForm();
      render();
    }

    function readSettingsForm(form) {
      const settings = cloneSettings(DEFAULT_SETTINGS);
      subjectKeys.forEach((key) => {
        const slots = Number(form.get(`slot-${key}`));
        if (!Number.isFinite(slots) || slots < 1) throw new Error("과목별 비율은 1 이상이어야 합니다.");
        settings.slots[key] = Math.round(slots);
      });
      ["korean", "math", "bioethics", "sociology"].forEach((key) => {
        const target = Number(form.get(`target-${key}`));
        if (!Number.isFinite(target) || target < 1 || target > 100) throw new Error("목표 백분위는 1~100 사이여야 합니다.");
        settings.targets[key] = target;
      });
      const bioethics = String(form.get("alias-bioethics") || "").trim();
      const sociology = String(form.get("alias-sociology") || "").trim();
      if (!bioethics || !sociology) throw new Error("탐구 별명은 비워둘 수 없습니다.");
      settings.aliases.bioethics = bioethics.slice(0, 12);
      settings.aliases.sociology = sociology.slice(0, 12);
      const buffer = Number(form.get("target-buffer-days"));
      if (!Number.isFinite(buffer) || buffer < 0 || buffer > 60) throw new Error("목표 완료 여유일은 0~60 사이여야 합니다.");
      settings.targetBufferDays = Math.round(buffer);
      return normalizeSettings(settings);
    }

    function handleSubmit(event) {
      event.preventDefault();
      try {
        const record = buildRecord(new FormData(event.currentTarget), state.editingId);
        if (state.editingId) {
          state.records = state.records.map((item) => item.id === state.editingId ? record : item);
        } else {
          state.records.push(record);
        }
        state.records.sort((a, b) => a.date.localeCompare(b.date));
        saveState();
        resetForm();
        render();
      } catch (error) {
        $("#form-error").textContent = error.message;
      }
    }

    function buildRecord(form, existingId = null) {
      const name = String(form.get("name") || "").trim();
      const date = String(form.get("date") || "");
      if (!name || !date) throw new Error("시험명과 날짜를 입력해야 합니다.");

      const scores = {};
      const gems = {};
      let takenCount = 0;
      subjectKeys.forEach((key) => {
        if (!form.get(`${key}-taken`)) return;
        takenCount += 1;
        const subject = SUBJECTS[key];
        if (subject.type === "english") {
          const grade = Number(form.get(`${key}-grade`));
          if (grade < 1 || grade > 9) throw new Error("영어 등급은 1~9등급만 입력할 수 있습니다.");
          scores[key] = { taken: true, grade };
          gems[key] = englishGems(grade);
          return;
        }

        const directPercentile = !!form.get(`${key}-direct-percentile`);
        if (directPercentile) {
          const percentile = requiredNumber(form, `${key}-percentile`, `${appSubjectLabel(key)} 백분위`);
          if (percentile < 0 || percentile > 100) throw new Error(`${appSubjectLabel(key)} 백분위는 0~100 사이여야 합니다.`);
          scores[key] = { taken: true, inputMode: "percentile", percentile };
          gems[key] = percentileToGems(percentile, subject);
          return;
        }

        const raw = requiredNumber(form, `${key}-raw`, `${appSubjectLabel(key)} 원점수`);
        const skip4 = !!form.get(`${key}-skip4`);
        const cutoffs = [1, 2, 3].map((grade) => requiredNumber(form, `${key}-cut${grade}`, `${appSubjectLabel(key)} ${grade}컷`));
        if (!skip4) cutoffs.push(requiredNumber(form, `${key}-cut4`, `${appSubjectLabel(key)} 4컷`));
        const percentile = estimatePercentile(raw, cutoffs);
        scores[key] = { taken: true, inputMode: "cutoffs", raw, cutoffs, percentile, skip4 };
        gems[key] = percentileToGems(percentile, subject);
      });
      if (!takenCount) throw new Error("최소 1개 과목은 응시로 선택해야 합니다.");

      return {
        id: existingId || (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`),
        date,
        name,
        scores,
        gems
      };
    }

    function requiredNumber(form, name, label) {
      const raw = String(form.get(name) ?? "").trim();
      if (raw === "") throw new Error(`${label} 입력값을 확인해야 합니다.`);
      const value = Number(raw);
      if (!Number.isFinite(value)) throw new Error(`${label} 입력값을 확인해야 합니다.`);
      return value;
    }

    function estimatePercentile(raw, cutoffs) {
      const anchors = [
        { score: 100, percentile: 100 },
        { score: cutoffs[0], percentile: 96 },
        { score: cutoffs[1], percentile: 89 },
        { score: cutoffs[2], percentile: 77 },
        { score: 0, percentile: 0 }
      ];
      if (Number.isFinite(cutoffs[3])) {
        anchors.splice(4, 0, { score: cutoffs[3], percentile: 60 });
      }
      anchors.sort((a, b) => b.score - a.score);

      if (raw >= anchors[0].score) return 100;
      for (let index = 0; index < anchors.length - 1; index += 1) {
        const high = anchors[index];
        const low = anchors[index + 1];
        if (raw <= high.score && raw >= low.score) {
          if (high.score === low.score) return low.percentile;
          const ratio = (raw - low.score) / (high.score - low.score);
          return clamp(low.percentile + ratio * (high.percentile - low.percentile), 0, 100);
        }
      }
      return 0;
    }

    function percentileToGems(percentile, subject) {
      const targetUnits = percentileUnits(subject.target);
      const currentUnits = percentileUnits(clamp(percentile, 0, subject.target));
      return Math.round((currentUnits / targetUnits) * subject.slots);
    }

    function percentileUnits(percentile) {
      const p = Math.max(0, percentile);
      const first = Math.min(p, 70) / 7;
      const second = Math.max(0, Math.min(p, 85) - 70) / 4;
      const third = Math.max(0, p - 85) / 2;
      return first + second + third;
    }

    function englishGems(grade) {
      return ({ 1: 14, 2: 11, 3: 7, 4: 3, 5: 1 })[grade] || 0;
    }

    function englishPercentile(grade) {
      return ({ 1: 96, 2: 89, 3: 77, 4: 60, 5: 40, 6: 23, 7: 11, 8: 4, 9: 0 })[grade] ?? 0;
    }

    function latestRecord() {
      return state.records.length ? [...state.records].sort((a, b) => a.date.localeCompare(b.date)).at(-1) : null;
    }

    function totalGems(record) {
      if (!record) return 0;
      return subjectKeys.reduce((sum, key) => {
        const score = record.scores[key];
        if (!score) return sum;
        if (SUBJECTS[key].type === "english") return sum + englishGems(score.grade);
        return sum + percentileToGems(score.percentile, SUBJECTS[key]);
      }, 0);
    }

    function render() {
      const prediction = buildPrediction(state.records);
      $("#total-gems").textContent = `${prediction.actualGem}/${totalGemSlots()}`;
      $("#pace-status").innerHTML = paceIcon(prediction.pace.status) + `<span>${prediction.pace.text}</span>`;
      $("#pace-trend").textContent = prediction.paceTrend.text;
      $("#progress-rate").textContent = `${prediction.progressRate}%`;
      $("#confidence").textContent = prediction.confidence.label;
      $("#bottleneck").textContent = prediction.bottlenecks.length ? prediction.bottlenecks.join(", ") : "-";
      renderSubjectBars(prediction);
      renderRecords();
      renderForecast(prediction);
    }

    function renderSubjectBars(prediction) {
      $("#subject-bars").innerHTML = subjectKeys.map((key) => {
        const subject = SUBJECTS[key];
        const subjectState = prediction.subjects[key];
        const count = subjectState.actualGem;
        const taken = subjectState.observed;
        const percent = Math.min(100, Math.round((count / subject.slots) * 100));
        return `
          <div class="subject-row">
            <strong>${appSubjectLabelHtml(key)}</strong>
            <div class="bar"><span style="width:${percent}%"></span></div>
            <span>${taken ? `${count}/${subject.slots}` : "-"}</span>
          </div>
        `;
      }).join("");
    }

    function renderRecords() {
      parkFormShell();
      if (!state.records.length) {
        $("#record-list").innerHTML = `<p class="muted">저장된 시험 없음</p>`;
        placeFormShell();
        return;
      }
      $("#record-list").innerHTML = [...state.records].sort((a, b) => b.date.localeCompare(a.date)).map((record) => `
        <article class="record">
          <div>
            <strong>${escapeHtml(record.name)}</strong>${state.editingId === record.id ? `<span class="editing-mark">수정 중</span>` : ""}
            <small>${record.date} · ${takenLabels(record)}</small>
          </div>
          <strong>${totalGems(record)} gem</strong>
          <button type="button" data-edit="${record.id}">${state.editingId === record.id ? "접기" : "펼치기"}</button>
          <button type="button" data-delete="${record.id}">삭제</button>
        </article>
        <div class="record-form-slot" data-form-slot="${escapeHtml(record.id)}"></div>
      `).join("");
      document.querySelectorAll("[data-edit]").forEach((button) => {
        button.addEventListener("click", () => editRecord(button.dataset.edit));
      });
      document.querySelectorAll("[data-delete]").forEach((button) => {
        button.addEventListener("click", () => {
          state.records = state.records.filter((record) => record.id !== button.dataset.delete);
          saveState();
          if (state.editingId === button.dataset.delete) resetForm();
          render();
        });
      });
      placeFormShell();
    }

    function renderForecast(prediction) {
      $("#forecast-date").textContent = prediction.forecastDate || "-";
      $("#forecast-log").textContent = prediction.summary;
    }

    function buildPrediction(records) {
      const sorted = [...records].sort((a, b) => a.date.localeCompare(b.date));
      const subjectState = buildSubjectState(sorted);
      const baselineState = buildBaselineState(sorted);
      const actualGem = subjectKeys.reduce((sum, key) => sum + subjectState[key].actualGem, 0);
      const daysLeft = Math.max(0, (targetDay().getTime() - Date.now()) / 86400000);
      const predictedSubjects = predictSubjects(sorted, subjectState, daysLeft);
      const pace = paceStatus(baselineState, subjectState);
      const paceTrend = paceTrendStatus(sorted, baselineState, pace);
      const forecastDate = forecastGoalDate(baselineState, subjectState);
      const confidence = modelConfidence(sorted, predictedSubjects);
      const bottlenecks = detectBottlenecks(predictedSubjects);
      const byTargetDay = forecastDate && dateValue(forecastDate) <= targetDay().getTime() ? "목표일 전 100% 도달권" : "목표일 이후 도달 예상";
      const forecastLabel = forecastDate || "미도달 예상";
      return {
        actualGem,
        pace,
        paceTrend,
        progressRate: ((actualGem / totalGemSlots()) * 100).toFixed(1),
        forecastDate: forecastLabel,
        confidence,
        bottlenecks,
        subjects: predictedSubjects,
        summary: [
          `${pace.fullText}`,
          `${paceTrend.fullText}`,
          byTargetDay
        ].join("\n")
      };
    }

    function buildSubjectState(records) {
      return subjectKeys.reduce((acc, key) => {
        const points = subjectPoints(key, records);
        const latest = points.at(-1);
        const target = subjectTargetUnits(key);
        acc[key] = {
          key,
          label: appSubjectLabel(key),
          targetUnits: target,
          actualUnits: latest ? latest.units : 0,
          actualGem: unitsToSubjectGem(latest ? latest.units : 0, key),
          observed: !!latest,
          points
        };
        return acc;
      }, {});
    }

    function buildBaselineState(records) {
      const baseline = records[0] || null;
      if (!baseline) return { date: null, units: 0, gem: 0 };
      const units = recordUnits(baseline);
      return {
        date: baseline.date,
        units
      };
    }

    function subjectPoints(key, records) {
      return records
        .filter((record) => record.scores[key])
        .map((record) => {
          const score = record.scores[key];
          const percentile = SUBJECTS[key].type === "english" ? englishPercentile(score.grade) : score.percentile;
          return {
            date: record.date,
            units: percentileUnits(clamp(percentile, 0, SUBJECTS[key].target)),
            percentile
          };
        })
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function predictSubjects(records, subjectState, daysLeft) {
      return subjectKeys.reduce((acc, key) => {
        const subject = subjectState[key];
        const slope = weightedSubjectSlope(subject.points);
        const volatility = subjectVolatility(subject.points);
        const remaining = Math.max(0, subject.targetUnits - subject.actualUnits);
        const damping = subject.targetUnits ? clamp(remaining / subject.targetUnits, 0.18, 1) : 0;
        const volatilityPenalty = Math.min(remaining, volatility * 0.35);
        const predictedUnits = clamp(subject.actualUnits + slope * daysLeft * damping - volatilityPenalty, 0, subject.targetUnits);
        acc[key] = {
          ...subject,
          slope,
          volatility,
          predictedUnits,
          predictedGem: unitsToSubjectGem(predictedUnits, key),
          gapUnits: Math.max(0, subject.targetUnits - predictedUnits)
        };
        return acc;
      }, {});
    }

    function weightedSubjectSlope(points) {
      if (points.length < 2) return 0;
      let weighted = 0;
      let weights = 0;
      for (let index = 1; index < points.length; index += 1) {
        const prev = points[index - 1];
        const next = points[index];
        const days = Math.max(1, (dateValue(next.date) - dateValue(prev.date)) / 86400000);
        const weight = index / (points.length - 1);
        weighted += ((next.units - prev.units) / days) * weight;
        weights += weight;
      }
      return weighted / Math.max(weights, 1);
    }

    function subjectVolatility(points) {
      if (points.length < 3) return 0;
      const deltas = [];
      for (let index = 1; index < points.length; index += 1) {
        deltas.push(points[index].units - points[index - 1].units);
      }
      const mean = deltas.reduce((sum, value) => sum + value, 0) / deltas.length;
      const variance = deltas.reduce((sum, value) => sum + (value - mean) ** 2, 0) / deltas.length;
      return Math.sqrt(variance);
    }

    function forecastGoalDate(baseline, currentState) {
      if (!baseline.date) return null;
      const start = dateValue(baseline.date);
      const end = targetDay().getTime();
      const duration = Math.max(1, end - start);
      const targetUnits = totalTargetUnits();
      const actualUnits = subjectKeys.reduce((sum, key) => sum + currentState[key].actualUnits, 0);
      if (actualUnits >= targetUnits) return new Date().toISOString().slice(0, 10);
      const currentT = clamp((Date.now() - start) / duration, 0, 2);
      const progress = clamp((actualUnits - baseline.units) / Math.max(1e-6, targetUnits - baseline.units), 0, 1);
      const equivalentT = progress ** (1 / ENGINE_GAMMA);
      const lag = currentT - equivalentT;
      const forecastT = 1 + lag;
      const forecast = new Date(start + duration * forecastT);
      return forecast.toISOString().slice(0, 10);
    }

    function paceStatus(baseline, currentState) {
      const targetUnits = totalTargetUnits();
      const actualUnits = subjectKeys.reduce((sum, key) => sum + currentState[key].actualUnits, 0);
      const baselineUnits = baseline.units || actualUnits;
      const start = baseline.date ? dateValue(baseline.date) : Date.now();
      const end = targetDay().getTime();
      const elapsed = clamp((Date.now() - start) / Math.max(1, end - start), 0, 1);
      const curve = elapsed ** ENGINE_GAMMA;
      const expectedUnits = baselineUnits + (targetUnits - baselineUnits) * curve;
      const gapUnits = actualUnits - expectedUnits;
      const gapGem = Math.round(unitsToGemDelta(gapUnits));
      const amount = Math.abs(gapGem);
      const direction = gapGem >= 0 ? "초과" : "부족";
      const status = gapGem > 0 ? "star" : gapGem < 0 ? "warning" : "check";
      return {
        status,
        delta: gapGem,
        baselineDate: baseline.date,
        expectedGem: unitsToGemAbsolute(expectedUnits),
        gapGem,
        text: `${amount} ${direction}`,
        fullText: `오늘 도달했어야 했던 기준보다 ${amount} gem ${direction}합니다.`
      };
    }

    function paceTrendStatus(records, baseline, currentPace) {
      if (records.length < 2) {
        return { value: 0, text: "", fullText: "페이스 변화량은 기록 2회차부터 계산합니다." };
      }
      const previousRecords = records.slice(0, -1);
      const previousState = buildSubjectState(previousRecords);
      const previousPace = paceStatus(baseline, previousState);
      const value = currentPace.gapGem - previousPace.gapGem;
      const sign = value > 0 ? "+" : "";
      return {
        value,
        text: `전회 대비 ${sign}${value}`,
        fullText: `페이스는 전회 대비 ${sign}${value} gem 변화했습니다.`
      };
    }

    function paceIcon(status) {
      const icons = {
        star: `<span class="pace-icon star" aria-label="초과"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.2 5.9 20.6l1.4-6.8-5.1-4.7 6.9-.8L12 2z"></path></svg></span>`,
        check: `<span class="pace-icon" aria-label="정상"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6L9 17l-5-5"></path></svg></span>`,
        warning: `<span class="pace-icon" aria-label="부족"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l10 18H2L12 3z"></path><path d="M12 9v5"></path><path d="M12 17h.01"></path></svg></span>`
      };
      return icons[status] || icons.check;
    }

    function modelConfidence(records, subjectState) {
      const pointCount = subjectKeys.reduce((sum, key) => sum + subjectState[key].points.length, 0);
      const observedSubjects = subjectKeys.filter((key) => subjectState[key].observed).length;
      const avgVolatility = subjectKeys.reduce((sum, key) => sum + (subjectState[key].volatility || 0), 0) / subjectKeys.length;
      let score = 18 + Math.min(records.length, 8) * 6 + Math.min(pointCount, 24) * 1.5 + observedSubjects * 5;
      score -= Math.min(24, avgVolatility * 4);
      score = Math.round(clamp(score, 5, 92));
      const label = score >= 75 ? "high" : score >= 52 ? "mid" : "low";
      return { score, label };
    }

    function detectBottlenecks(subjects) {
      return Object.values(subjects)
        .filter((subject) => subject.observed)
        .sort((a, b) => b.gapUnits - a.gapUnits)
        .slice(0, 2)
        .filter((subject) => subject.gapUnits > 0)
        .map((subject) => subject.label);
    }

    function totalTargetUnits() {
      return subjectKeys.reduce((sum, key) => sum + subjectTargetUnits(key), 0);
    }

    function subjectTargetUnits(key) {
      return percentileUnits(SUBJECTS[key].target);
    }

    function recordUnits(record) {
      return subjectKeys.reduce((sum, key) => {
        const score = record.scores[key];
        if (!score) return sum;
        const percentile = SUBJECTS[key].type === "english" ? englishPercentile(score.grade) : score.percentile;
        return sum + percentileUnits(clamp(percentile, 0, SUBJECTS[key].target));
      }, 0);
    }

    function unitsToGemAbsolute(units) {
      return Math.round((clamp(units, 0, totalTargetUnits()) / totalTargetUnits()) * totalGemSlots());
    }

    function unitsToGemDelta(units) {
      return (units / totalTargetUnits()) * totalGemSlots();
    }

    function unitsToSubjectGem(units, key) {
      const subject = SUBJECTS[key];
      return Math.round((clamp(units, 0, subjectTargetUnits(key)) / subjectTargetUnits(key)) * subject.slots);
    }

    function dateValue(date) {
      return new Date(`${date}T00:00:00+09:00`).getTime();
    }

    function editRecord(id) {
      if (state.editingId === id) {
        resetForm();
        return;
      }
      const record = state.records.find((item) => item.id === id);
      if (!record) return;
      state.editingId = id;
      state.isCreating = false;
      clearScoreForm(false);
      $("#form-shell").classList.remove("hidden");
      $("#form-error").textContent = "";
      $("#exam-name").value = record.name;
      $("#exam-date").value = record.date;
      subjectKeys.forEach((key) => {
        const score = record.scores[key];
        document.querySelector(`[name="${key}-taken"]`).checked = !!score;
        syncSubjectEnabled(key);
        if (!score) return;
        if (SUBJECTS[key].type === "english") {
          document.querySelector(`[name="${key}-grade"]`).value = score.grade;
          return;
        }
        const directPercentile = score.inputMode === "percentile" || !Array.isArray(score.cutoffs);
        document.querySelector(`[name="${key}-direct-percentile"]`).checked = directPercentile;
        if (directPercentile) {
          document.querySelector(`[name="${key}-percentile"]`).value = score.percentile ?? "";
        } else {
          document.querySelector(`[name="${key}-raw"]`).value = score.raw;
          [1, 2, 3, 4].forEach((grade, index) => {
            document.querySelector(`[name="${key}-cut${grade}"]`).value = score.cutoffs[index] ?? "";
          });
          document.querySelector(`[name="${key}-skip4"]`).checked = !!score.skip4;
        }
        syncSubjectEnabled(key);
      });
      $("#submit-button").textContent = "수정 저장";
      renderRecords();
    }

    function openNewRecord() {
      resetForm();
      state.isCreating = true;
      $("#form-shell").classList.remove("hidden");
      $("#submit-button").textContent = "저장";
      renderRecords();
    }

    function resetForm() {
      state.editingId = null;
      state.isCreating = false;
      $("#score-form").reset();
      $("#exam-name").value = "모의고사";
      initDate();
      $("#form-error").textContent = "";
      $("#form-shell").classList.add("hidden");
      clearScoreForm(true);
      $("#submit-button").textContent = "저장";
      renderRecords();
    }

    function clearScoreForm(takenDefault) {
      subjectKeys.forEach((key) => {
        const card = document.querySelector(`[data-subject="${key}"]`);
        document.querySelector(`[name="${key}-taken"]`).checked = takenDefault;
        const skip4 = document.querySelector(`[name="${key}-skip4"]`);
        if (skip4) skip4.checked = false;
        const directPercentile = document.querySelector(`[name="${key}-direct-percentile"]`);
        if (directPercentile) directPercentile.checked = false;
        card.querySelectorAll("input:not([type='checkbox'])").forEach((input) => {
          input.value = "";
        });
        const select = card.querySelector("select");
        if (select) select.value = "1";
        syncSubjectEnabled(key);
      });
    }

    function parkFormShell() {
      const shell = $("#form-shell");
      const list = $("#record-list");
      if (shell && list.contains(shell)) list.after(shell);
    }

    function placeFormShell() {
      const shell = $("#form-shell");
      if (!shell) return;
      if (state.isCreating) {
        $("#new-record-slot").appendChild(shell);
        shell.classList.remove("hidden");
        return;
      }
      if (state.editingId) {
        const slot = [...document.querySelectorAll("[data-form-slot]")].find((item) => item.dataset.formSlot === state.editingId);
        if (slot) {
          slot.appendChild(shell);
          shell.classList.remove("hidden");
          return;
        }
      }
      shell.classList.add("hidden");
    }

    function syncSubjectEnabled(key) {
      const card = document.querySelector(`[data-subject="${key}"]`);
      const checked = document.querySelector(`[name="${key}-taken"]`).checked;
      const directPercentile = !!document.querySelector(`[name="${key}-direct-percentile"]`)?.checked;
      card.classList.toggle("off", !checked);
      card.querySelectorAll("input:not([type='checkbox']), select").forEach((input) => {
        input.disabled = !checked;
      });
      const skip4 = document.querySelector(`[name="${key}-skip4"]`);
      const cut4 = document.querySelector(`[name="${key}-cut4"]`);
      const cutGrid = document.querySelector(`[data-cut-grid="${key}"]`);
      const percentileGrid = document.querySelector(`[data-percentile-grid="${key}"]`);
      cutGrid?.classList.toggle("hidden", directPercentile);
      percentileGrid?.classList.toggle("hidden", !directPercentile);
      cutGrid?.querySelectorAll("input").forEach((input) => {
        input.disabled = !checked || directPercentile;
      });
      percentileGrid?.querySelectorAll("input").forEach((input) => {
        input.disabled = !checked || !directPercentile;
      });
      if (skip4 && cut4) {
        skip4.disabled = !checked || directPercentile;
        cut4.disabled = !checked || directPercentile || skip4.checked;
        if (skip4.checked) cut4.value = "";
      }
    }

    function takenLabels(record) {
      return subjectKeys.filter((key) => record.scores[key]).map((key) => appSubjectLabelHtml(key)).join(", ");
    }

    function tickCountdown() {
      const remaining = Math.max(0, EXAM_DAY.getTime() - Date.now());
      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const label = window.matchMedia("(max-width: 960px)").matches ? "수능까지" : "2027학년도 수능까지";
      $("#countdown").textContent = `${label} ${days}일 ${hours}시간 ${minutes}분 ${seconds}초 남음`;
    }

    function timeText() {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Seoul",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }
  </script>
</body>
</html>
